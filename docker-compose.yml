services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: grabpic
      POSTGRES_PASSWORD: grabpic
      POSTGRES_DB: grabpic
    ports:
      - "5432:5432"
    volumes:
      - grabpic_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grabpic"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://grabpic:grabpic@db:5432/grabpic
      STORAGE_DIR: /app/data/images
      MODEL_DIR: /app/models
      FACE_ENGINE: opencv
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    ports:
      - "8000:8000"

volumes:
  grabpic_pg:
